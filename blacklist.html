<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add to Blacklist - AI Security Gate Pass</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .search-box-card {
      margin-bottom: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 1.5rem;
    }

    .search-inputs {
      display: flex;
      gap: 12px;
      margin-top: 0.75rem;
    }

    .directory-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .person-item-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: space-between;
    }

    .person-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 1rem;
    }

    .person-photo {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
    }

    .person-details h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .person-details p {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .info-list-specs {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-list-specs strong {
      color: var(--text-muted);
    }

    /* Modal Form Options */
    .reason-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.75rem 1rem;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reason-option:hover {
      border-color: var(--color-denied);
      background: rgba(239, 68, 68, 0.02);
    }

    .reason-option input {
      accent-color: var(--color-denied);
    }

    .reason-option span {
      font-size: 0.85rem;
      font-weight: 500;
    }

    .empty-state {
      grid-column: span 3;
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    @media (max-width: 1024px) {
      .directory-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 640px) {
      .directory-grid {
        grid-template-columns: 1fr;
      }
      .search-inputs {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <main class="main-content">
      
      <div class="content-header">
        <div class="page-title">
          <h1>Restrict Security Clearance</h1>
          <p>Search active registry databases to blacklist individuals with safety flags</p>
        </div>
      </div>

      <!-- Search console -->
      <div class="search-box-card">
        <label class="form-label" for="searchQuery">Search Operator Directory</label>
        <div class="search-inputs">
          <div style="flex-grow: 1; position: relative;">
            <input type="text" id="searchQuery" class="form-control" placeholder="Search by Full Name or 12-digit Aadhaar Card Number..." oninput="filterPeople()">
          </div>
          <button class="btn btn-secondary" onclick="clearSearch()">Clear Search</button>
        </div>
      </div>

      <!-- Directory Grid Results -->
      <div class="directory-grid" id="directoryGrid">
        <!-- Loaded via JavaScript -->
      </div>

    </main>
  </div>

  <!-- Block Dialog Modal Overlay -->
  <div class="modal-overlay" id="blockModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" style="color:var(--color-denied);">Block Security Clearance</h3>
        <button class="modal-close" onclick="closeBlockModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom: 1.25rem;">
          You are restricting access for <strong id="modalTargetName" style="color:var(--text-primary)">-</strong>. Select the primary reason for this warning flag.
        </p>

        <form id="blockForm">
          <label class="reason-option">
            <input type="radio" name="blockReason" value="Suspicious behavior / hostile intent" checked>
            <span>Suspicious behavior / hostile intent</span>
          </label>
          <label class="reason-option">
            <input type="radio" name="blockReason" value="Unauthorised trespassing attempt">
            <span>Unauthorised trespassing attempt</span>
          </label>
          <label class="reason-option">
            <input type="radio" name="blockReason" value="Insubordination / Disruption on premises">
            <span>Insubordination / Disruption on premises</span>
          </label>
          <label class="reason-option">
            <input type="radio" name="blockReason" value="Reported Police / Criminal record background">
            <span>Reported Police / Criminal record background</span>
          </label>
          <label class="reason-option">
            <input type="radio" name="blockReason" value="Other security concerns / Terminal threat">
            <span>Other security concerns / Terminal threat</span>
          </label>

          <!-- Hidden inputs for ID -->
          <input type="hidden" id="modalTargetId">

          <div style="margin-top: 1.5rem; display:flex; justify-content:flex-end; gap:10px;">
            <button type="button" class="btn btn-secondary" onclick="closeBlockModal()">Cancel</button>
            <button type="submit" class="btn btn-danger">Confirm Blacklist Block</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="global.js"></script>
  <script>
    Auth.requireAuth();

    const queryInput = document.getElementById('searchQuery');
    const directoryGrid = document.getElementById('directoryGrid');
    const blockModal = document.getElementById('blockModal');
    
    const modalTargetName = document.getElementById('modalTargetName');
    const modalTargetId = document.getElementById('modalTargetId');
    const blockForm = document.getElementById('blockForm');

    // Retrieve active registered entries
    const filterPeople = () => {
      const query = queryInput.value.trim().toLowerCase();
      const people = Db.getPeople();
      
      const filtered = people.filter(p => 
        p.name.toLowerCase().includes(query) || 
        p.adhar.includes(query)
      );

      renderGrid(filtered);
    };

    const clearSearch = () => {
      queryInput.value = '';
      filterPeople();
    };

    const renderGrid = (items) => {
      directoryGrid.innerHTML = '';

      if (items.length === 0) {
        directoryGrid.innerHTML = `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-muted); margin-bottom:10px;">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <p>No matching active personnel found in the system registry.</p>
          </div>
        `;
        return;
      }

      items.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card person-item-card';
        card.innerHTML = `
          <div>
            <div class="person-meta">
              <img src="${p.photo}" class="person-photo" alt="Photo">
              <div class="person-details">
                <h3>${p.name}</h3>
                <span class="status-badge secure" style="padding: 1px 6px; font-size: 0.6rem; margin-top:4px;">
                  ${p.category}
                </span>
              </div>
            </div>
            <div class="info-list-specs">
              <div><strong>Aadhaar:</strong> ${p.adhar.replace(/(.{4})/g, '$1 ')}</div>
              <div><strong>ID Code:</strong> ${p.empId}</div>
              <div><strong>Phone:</strong> ${p.phone}</div>
              <div style="font-size:0.75rem; line-height:1.3; margin-top:4px;"><strong>Address:</strong> ${p.address}</div>
            </div>
          </div>
          
          <button class="btn btn-danger btn-block" onclick="openBlockModal('${p.id}', '${p.name.replace(/'/g, "\\'")}')" style="padding:0.5rem 1rem; font-size:0.8rem;">
            Restrict & Blacklist
          </button>
        `;
        directoryGrid.appendChild(card);
      });
    };

    // Modal Trigger Handlers
    const openBlockModal = (id, name) => {
      modalTargetId.value = id;
      modalTargetName.textContent = name;
      blockModal.classList.add('active');
    };

    const closeBlockModal = () => {
      blockModal.classList.remove('active');
      blockForm.reset();
    };

    // Process Blacklist operation
    blockForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const id = modalTargetId.value;
      const person = Db.getPerson(id);
      
      if (!person) {
        Toast.show("Error: Target records corrupted.", "denied");
        closeBlockModal();
        return;
      }

      const selectedReason = document.querySelector('input[name="blockReason"]:checked').value;

      // Restrict person in LocalStorage DB
      const result = Db.addToBlacklist(person, selectedReason);
      
      if (result) {
        Toast.show(`${person.name} has been added to blacklist!`, 'denied');
        closeBlockModal();
        
        setTimeout(() => {
          window.location.href = 'blacklist-view.html';
        }, 1000);
      } else {
        Toast.show('This Aadhaar record is already blocked.', 'warning');
      }
    });

    // Initial populate
    filterPeople();
  </script>
</body>
</html>
