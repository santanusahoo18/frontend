<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registry List - AI Security Gate Pass</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .registry-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .search-input-wrapper {
      position: relative;
      flex-grow: 1;
    }

    .filter-dropdown {
      width: 180px;
      flex-shrink: 0;
    }

    /* Table styles */
    .table-container {
      overflow-x: auto;
    }

    .registry-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      text-align: left;
    }

    .registry-table th {
      background: var(--bg-secondary);
      padding: 1rem;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
    }

    .registry-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
    }

    .registry-table tr:hover {
      background: rgba(15, 23, 42, 0.02);
    }

    .registry-photo {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
    }

    .actions-cell {
      display: flex;
      gap: 8px;
    }

    .empty-directory {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .registry-header-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .filter-dropdown {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <main class="main-content">
      
      <div class="content-header">
        <div class="page-title">
          <h1>Biometric Gate Registry</h1>
          <p>Search, filter and generate printable gate passes for active visitors and employees</p>
        </div>
        <button class="btn btn-primary" onclick="window.location.href='register-person.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>Register Person</span>
        </button>
      </div>

      <!-- Filter Controls Bar -->
      <div class="card card-premium" style="padding: 1.25rem;">
        <div class="registry-header-bar" style="margin-bottom: 0;">
          <div class="search-input-wrapper">
            <input type="text" id="queryInput" class="form-control" placeholder="Search by Name, Aadhaar number, Mobile, or ID Code..." oninput="applyFilters()">
          </div>
          <div class="filter-tabs" id="filterTabs" style="margin-bottom: 0;">
            <button class="filter-pill active" onclick="setCategoryFilter('ALL', this)">All</button>
            <button class="filter-pill" onclick="setCategoryFilter('Visitor', this)">Visitors</button>
            <button class="filter-pill" onclick="setCategoryFilter('Employee', this)">Employees</button>
          </div>
        </div>
      </div>

      <!-- Directory Table -->
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="table-container">
          <table class="registry-table">
            <thead>
              <tr>
                <th>Biometrics</th>
                <th>Full Name</th>
                <th>Aadhaar Number</th>
                <th>ID Code</th>
                <th>Category</th>
                <th>Purpose / Dept</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="registryBody">
              <!-- Loaded via JavaScript -->
            </tbody>
          </table>
        </div>
        
        <div class="empty-directory" id="emptyState" style="display:none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-muted); margin-bottom:12px;">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <p>No active directory entries match your query filters.</p>
        </div>
      </div>

    </main>
  </div>

  <script src="global.js"></script>
  <script>
    Auth.requireAuth();

    const queryInput = document.getElementById('queryInput');
    const registryBody = document.getElementById('registryBody');
    const emptyState = document.getElementById('emptyState');

    let activeCategory = 'ALL';

    const setCategoryFilter = (cat, element) => {
      activeCategory = cat;
      
      // Update active class on filter pills
      const pills = document.querySelectorAll('.filter-pill');
      pills.forEach(p => p.classList.remove('active'));
      element.classList.add('active');
      
      applyFilters();
    };

    const applyFilters = () => {
      const query = queryInput.value.trim().toLowerCase();
      const people = Db.getPeople();

      const filtered = people.filter(p => {
        const matchesQuery = p.name.toLowerCase().includes(query) ||
                             p.adhar.includes(query) ||
                             p.empId.toLowerCase().includes(query) ||
                             p.phone.includes(query);
                             
        const matchesCategory = (activeCategory === 'ALL') || (p.category === activeCategory);

        return matchesQuery && matchesCategory;
      });

      renderTable(filtered);
    };

    const renderTable = (items) => {
      registryBody.innerHTML = '';

      if (items.length === 0) {
        emptyState.style.display = 'block';
        document.querySelector('.registry-table').style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      document.querySelector('.registry-table').style.display = 'table';

      items.forEach(p => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><img src="${p.photo}" class="registry-photo" alt="Photo"></td>
          <td style="font-weight:600;">${p.name}</td>
          <td style="font-family:var(--font-title); font-size:0.85rem;">
            ${p.adhar.replace(/(.{4})/g, '$1 ')}
          </td>
          <td style="font-family:var(--font-title); font-size:0.85rem; font-weight:500; color:var(--color-accent);">
            ${p.empId}
          </td>
          <td>
            <span class="status-badge ${p.category === 'Employee' ? 'secure' : 'warning'}" style="padding: 1px 6px; font-size: 0.65rem;">
              ${p.category}
            </span>
          </td>
          <td style="font-size:0.8rem; color:var(--text-secondary); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
            ${p.purpose}
          </td>
          <td>
            <div class="actions-cell">
              <button class="btn btn-secondary" onclick="window.location.href='edit.html?id=${p.id}'" style="padding: 4px 8px; font-size: 0.75rem;">
                Edit
              </button>
              <button class="btn btn-primary" onclick="window.location.href='print-preview.html?id=${p.id}'" style="padding: 4px 8px; font-size: 0.75rem;">
                Pass
              </button>
            </div>
          </td>
        `;
        registryBody.appendChild(row);
      });
    };

    // Initial render
    applyFilters();
  </script>
</body>
</html>
